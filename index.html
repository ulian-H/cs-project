<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AI 智慧行事曆</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="calendar-app">
    <header class="app-header">
      <div>
        <h1>AI 智慧行事曆</h1>
        <p>支援月/週/日檢視、事件管理、Google Sheet 同步與簡易 AI 自然語言。</p>
      </div>
      <div class="header-actions">
        <button id="prev-btn" type="button">← 上一個</button>
        <div class="current-period" id="current-period"></div>
        <button id="next-btn" type="button">下一個 →</button>
        <div class="view-switcher" role="tablist" aria-label="切換檢視">
          <button class="view-btn active" data-view="month" type="button">月</button>
          <button class="view-btn" data-view="week" type="button">週</button>
          <button class="view-btn" data-view="day" type="button">日</button>
        </div>
      </div>
    </header>

    <main class="layout">
      <section class="calendar-panel">
        <div class="calendar-toolbar">
          <button id="open-event-btn" type="button">新增事件</button>
          <button id="sync-sheet-btn" type="button">同步到 Google Sheet</button>
        </div>
        <div id="calendar-grid" class="calendar-grid"></div>
        <div id="calendar-list" class="calendar-list hidden"></div>
      </section>

      <aside class="sidebar">
        <section class="panel">
          <h2>今日摘要</h2>
          <div id="summary-panel" class="summary-panel"></div>
        </section>

        <section class="panel categories-panel">
          <h2>顏色分類</h2>
          <ul class="category-list" id="category-list"></ul>
        </section>

        <section class="panel ai-panel">
          <h2>AI 助手</h2>
          <textarea id="ai-input" placeholder="例如：下週三下午三點跟老師討論專題"></textarea>
          <div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap">
            <button id="auto-weather-btn" type="button">天氣自動填入</button>
            <button id="auto-transport-btn" type="button">交通時間查詢</button>
          </div>
          <div style="display:flex;gap:8px;margin-top:8px;align-items:center">
            <label style="font-size:13px">預設時長 (分)
              <input id="ai-duration" type="number" min="10" value="60" style="width:80px;margin-left:6px" />
            </label>
            <label style="font-size:13px">預設優先
              <select id="ai-priority" style="margin-left:6px">
                <option value="高">高</option>
                <option value="中" selected>中</option>
                <option value="低">低</option>
              </select>
            </label>
            <label style="font-size:13px;margin-left:6px"><input id="ai-draft-toggle" type="checkbox" /> 產生排程草案可編輯</label>
          </div>
          <button id="ai-action-btn" type="button" style="margin-top:8px">解析並建立</button>
          <div id="ai-response" class="ai-response"></div>
          <div id="ai-draft" class="ai-response" style="margin-top:12px"></div>
        </section>
        <section class="panel integration-panel">
          <h2>整合 / 通知</h2>
          <div style="display:flex;gap:12px;align-items:flex-start">
            <div style="min-width:120px">
              <a href="https://line.me/R/ti/p/%40791ukcov" target="_blank" rel="noopener">
                <img id="integration-qr" src="qr.svg" alt="LINE QR Code" style="width:120px;height:auto;border-radius:8px;border:1px solid var(--border)" />
              </a>
              <div style="font-size:12px;color:var(--muted);margin-top:6px">掃描或點擊開啟 LINE</div>
            </div>
            <div style="flex:1">
              <div id="auth-area">
                <button id="google-signin-btn" type="button">以 Google 登入</button>
                <button id="google-signout-btn" type="button" class="hidden">登出</button>
                <div id="user-info" style="margin-top:8px;color:var(--muted)"></div>
              </div>
              <div style="margin-top:12px">
                <label>通知 Email (接收提醒)
                  <input id="notify-email" type="email" placeholder="example@gmail.com" />
                </label>
                <button id="test-email-btn" type="button">測試寄信通知</button>
              </div>
            </div>
          </div>
          <p style="margin-top:8px;color:var(--muted)">這是 Line 的 AI 機器人。</p>
        </section>
      </aside>
    </main>
    <div id="event-modal" class="modal hidden" aria-hidden="true">
      <div class="modal-content" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <div class="modal-header">
          <h2 id="modal-title">新增 / 編輯事件</h2>
          <button id="close-modal-btn" class="close-btn" type="button">×</button>
        </div>
        <form id="event-form" onsubmit="return false;">
          <label>標題 <input id="event-title" type="text" placeholder="例如：數學補習" required /></label>
          <label>日期 <input id="event-date" type="date" required /></label>
          <div class="row-gap">
            <label>開始時間 <input id="event-start" type="time" /></label>
            <label>結束時間 <input id="event-end" type="time" /></label>
          </div>
          <label class="checkbox-label"><input id="event-all-day" type="checkbox" /> 全天事件</label>
          <label>分類
            <select id="event-category"></select>
          </label>
          <label>提醒
            <select id="event-remind">
              <option value="0">不提醒</option>
              <option value="5">提前 5 分鐘</option>
              <option value="30">提前 30 分鐘</option>
              <option value="1440">提前 1 天</option>
            </select>
          </label>
          <label>重複
            <select id="event-recurring">
              <option value="none">無</option>
              <option value="daily">每天</option>
              <option value="weekly">每週</option>
              <option value="monthly">每月</option>
            </select>
          </label>
          <label>描述 <textarea id="event-desc" placeholder="事件細節，可選填"></textarea></label>
          <div class="modal-actions">
            <button id="save-event-btn" type="button">存檔</button>
            <button id="delete-event-btn" type="button" class="danger hidden">刪除</button>
          </div>
          <div id="event-message" class="event-message"></div>
        </form>
      </div>
    </div>
    
  </div> <script src="script.js"></script>
</body>
</html>
