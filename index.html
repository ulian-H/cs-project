<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>待辦清單</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <h1>待辦清單</h1>
    <form id="todo-form" class="new-todo" onsubmit="return false;">
      <input id="title-input" type="text" placeholder="新增待辦" aria-label="新增待辦">
      <textarea id="desc-input" placeholder="描述" aria-label="描述"></textarea>
      <button id="add-btn" type="button">新增</button>
    </form>
    <ul id="todo-list" class="todo-list" aria-live="polite"></ul>
  </div>
  <script src="script.js"></script>
</body>
</html>
